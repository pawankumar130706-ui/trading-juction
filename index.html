<!DOCTYPE html>
<html>
<head>
  <title>Akash North Indian Food Corner</title>
  <style>
    body{font-family:Arial;margin:0;background:#fff8ef;color:#222}
    header{background:#d35400;color:white;text-align:center;padding:25px}
    .box{padding:20px;max-width:900px;margin:auto}
    .item{background:white;margin:12px 0;padding:15px;border-radius:12px;box-shadow:0 2px 8px #ddd}
    button{background:#25D366;color:white;border:0;padding:10px 15px;border-radius:8px;font-size:16px}
    input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc}
    footer{text-align:center;background:#222;color:white;padding:15px}
  </style>
</head>
<body>

<header>
  <h1>Akash North Indian Food Corner</h1>
  <p>Fresh • Tasty • North Indian Food</p>
</header>

<div class="box">
  <h2>Our Menu</h2>

  <div class="item">
    <h3>Paneer Butter Masala - ₹120</h3>
    <button onclick="addItem('Paneer Butter Masala ₹120')">Add Order</button>
  </div>

  <div class="item">
    <h3>Dal Tadka - ₹80</h3>
    <button onclick="addItem('Dal Tadka ₹80')">Add Order</button>
  </div>

  <div class="item">
    <h3>Roti - ₹10</h3>
    <button onclick="addItem('Roti ₹10')">Add Order</button>
  </div>

  <div class="item">
    <h3>Jeera Rice - ₹70</h3>
    <button onclick="addItem('Jeera Rice ₹70')">Add Order</button>
  </div>

  <div class="item">
    <h3>Veg Thali - ₹150</h3>
    <button onclick="addItem('Veg Thali ₹150')">Add Order</button>
  </div>

  <h2>Your Order</h2>
  <textarea id="order" rows="5" placeholder="Selected food items"></textarea>

  <h2>Customer Details</h2>
  <input id="name" placeholder="Your Name">
  <input id="mobile" placeholder="Mobile Number">
  <textarea id="address" rows="3" placeholder="Delivery Address"></textarea>

  <button onclick="sendOrder()">Order on WhatsApp</button>
</div>

<footer>
  <p>Akash North Indian Food Corner | Cash on Delivery Available</p>
</footer>

<script>
function addItem(item){
  document.getElementById("order").value += item + "\n";
}

function sendOrder(){
  let order = document.getElementById("order").value;
  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let address = document.getElementById("address").value;

  let msg = "New Food Order%0A%0AName: " + name +
            "%0AMobile: " + mobile +
            "%0AAddress: " + address +
            "%0A%0AOrder:%0A" + order;

  let whatsappNumber = "91XXXXXXXXXX";
  window.open("https://wa.me/" + whatsappNumber + "?text=" + msg);
}
</script>

</body>
</html>
